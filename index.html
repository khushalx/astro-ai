<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro AI</title>

  <style>
    body {
      background: radial-gradient(circle at top, #001100, #000);
      color: #0f0;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 100%;
      max-width: 420px;
      border: 1px solid #0f0;
      border-radius: 12px;
      padding: 15px;
      background: #050505;
      box-shadow: 0 0 20px rgba(0,255,0,0.3);
      display: flex;
      flex-direction: column;
    }

    .chat-box {
      height: 320px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin: 6px 0;
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 14px;
    }

    .user {
      background: #003300;
      align-self: flex-end;
    }

    .bot {
      background: #111;
      border: 1px solid #0f0;
      align-self: flex-start;
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .input-area {
      display: flex;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background: #00cc00;
      transform: scale(1.05);
    }

    .title {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="title">🚀 ASTRO AI</div>

  <div id="chat" class="chat-box"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask about space..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwQRscxVhnZlrm_BRF6qEjkO5JLNogMHTh-YltF8o037gEthyb51BdxVoNlKoVDv2wm1Q/exec";

const chat = document.getElementById("chat");
const input = document.getElementById("msg");

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.classList.add("message", type);
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("👤 " + text, "user");
  input.value = "";

  const typing = addMessage("🤖 Thinking...", "bot");

  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      message: text
    })
  })
  .then(res => res.text())  // Important for HtmlService
  .then(raw => {
    typing.remove();
    const data = JSON.parse(raw);
    addMessage("🤖 " + data.reply, "bot");
  })
  .catch(err => {
    typing.remove();
    addMessage("❌ Bot not responding", "error");
    console.error(err);
  });
}
</script>

</body>
</html>
